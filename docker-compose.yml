version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: family_recipes_db
    environment:
      POSTGRES_USER: family_recipes_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: family_recipes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_recipes_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: family_recipes_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family_recipes_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - ollama
    volumes:
      - ./backend:/app
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family_recipes_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/srv/app

volumes:
  postgres_data:
  ollama_data:
